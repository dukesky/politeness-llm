# =============================================================================
# Model roster — verified against OpenRouter /api/v1/models on 2026-06-10.
# Prices are USD per million tokens (pricing.prompt/completion × 1e6).
# provider_order pins backend; allow_fallbacks=False is set in collect.py.
# =============================================================================

defaults:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 200              # raised from 50; reasoning tokens count against max_tokens
  n_runs: 2                    # repeats per (model, prompt, pair); overridable per model
  reasoning_effort: "minimal"  # passed as reasoning.effort; overridable per model

models:
  # ── cheap tier (full grid: all pairs × all prompts × n_runs=3) ───────────

  - model_id: openai/gpt-5.4-mini           # latest OpenAI mini as of 2026-06-10
    tier: cheap
    family: openai
    provider_order: ["openai"]              # OpenAI official — closed-source, full precision
    price_per_m_input: 0.75
    price_per_m_output: 4.50
    reasoning_effort: "none"               # GPT-5.1+ supports reasoning suppression

  - model_id: anthropic/claude-haiku-4.5
    tier: cheap
    family: anthropic
    provider_order: ["anthropic"]           # Anthropic official — closed-source, full precision
    price_per_m_input: 1.00
    price_per_m_output: 5.00

  - model_id: google/gemini-3.5-flash
    tier: cheap
    family: google
    provider_order: ["google"]              # Google AI Studio — closed-source, full precision
    price_per_m_input: 1.50
    price_per_m_output: 9.00

  - model_id: deepseek/deepseek-v4-flash
    tier: cheap
    family: deepseek
    provider_order: ["deepseek"]            # DeepSeek official API — FP8 serving
    price_per_m_input: 0.0983
    price_per_m_output: 0.1966

  - model_id: qwen/qwen3.7-plus             # Qwen 3.7 instruct (non-reasoning) tier
    tier: cheap
    family: qwen
    provider_order: ["qwen"]               # Alibaba/Qwen official — full precision
    price_per_m_input: 0.40
    price_per_m_output: 1.60

  # ── flagship tier (20 % subsample, 1 run — reference only) ───────────────

  - model_id: openai/gpt-5.5
    tier: flagship
    family: openai
    provider_order: ["openai"]             # OpenAI official — closed-source, full precision
    price_per_m_input: 5.00
    price_per_m_output: 30.00
    subsample: 0.2
    n_runs: 1
    reasoning_effort: "none"              # GPT-5.1+ supports reasoning suppression

  - model_id: anthropic/claude-opus-4.8
    tier: flagship
    family: anthropic
    provider_order: ["anthropic"]          # Anthropic official — closed-source, full precision
    price_per_m_input: 5.00
    price_per_m_output: 25.00
    subsample: 0.2
    n_runs: 1

  - model_id: google/gemini-3.1-pro-preview  # gemini-3.5-pro not yet on OpenRouter; latest Pro
    tier: flagship
    family: google
    provider_order: ["google"]             # Google AI Studio — closed-source, full precision
    price_per_m_input: 2.00
    price_per_m_output: 12.00
    subsample: 0.2
    n_runs: 1
